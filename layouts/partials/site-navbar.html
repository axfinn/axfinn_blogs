{{ $url := .RelPermalink }}
{{ $type := .Type }}
<!-- Navbar -->
<nav class="navbar fixed-top navbar-expand-lg navbar-dark scrolling-navbar">
    <div class="container">

      <!-- Brand -->
      <a class="navbar-brand" href="{{ .Site.BaseURL }}">
          {{ if .Site.Params.avatar }}
        <img class="avatar" src="{{ .Site.Params.faviconfile | absURL }}" style="width: 40px!important;height: auto;"  class="d-inline-block align-top" alt="" >
        {{ end }}
        <strong> {{ .Site.Params.author }}</strong>
      </a>

      <!-- Collapse -->
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
        aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Links -->
      <div class="collapse navbar-collapse" id="navbarSupportedContent">

        <!-- Left -->
        <ul class="navbar-nav mr-auto ">
          <li class="nav-item {{ if eq $url "/" }} active {{ end }}">
            <a class="nav-link" href="{{ .Site.BaseURL }}">Home{{ if eq $url "/" }} <span class="sr-only">(current)</span>{{ end }}</a>
          </li>
          {{ range .Site.Menus.main }}
            <li class="nav-item {{ if eq $type (substr .URL 1 -1) }} active {{ end }}">
              <a class="nav-link" href="{{ .URL | absURL }}" >{{ .Name }} {{ if eq $type (substr .URL 1 -1) }} <span class="sr-only">(current)</span>{{ end }} </a>
            </li>

          {{ end }}
        </ul>

        <!-- Right - Search -->
        <ul class="navbar-nav">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="searchDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              <i class="fas fa-search"></i> 搜索
            </a>
            <div class="dropdown-menu dropdown-menu-right p-3" aria-labelledby="searchDropdown" style="min-width: 300px; max-width: 400px;">
              <form class="search-form" onsubmit="return false;">
                <div class="input-group">
                  <input type="text" id="search-query" class="form-control" placeholder="搜索文章标题或内容..." autocomplete="off">
                  <div class="input-group-append">
                    <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('search-query').focus();">
                      <i class="fas fa-search"></i>
                    </button>
                  </div>
                </div>
              </form>
              <ul id="search-results" class="list-unstyled mt-2 mb-0" style="max-height: 400px; overflow-y: auto;"></ul>
            </div>
          </li>
        </ul>

      </div>

    </div>
  </nav>
  <!-- Navbar -->
